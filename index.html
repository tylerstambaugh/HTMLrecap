<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Recap</title>
</head>
<body>
    <h1>Recap of the HTML Prework Tools Learned.</h1>

<br />
<nav style="text-align: right;">
    <a href="https:www.stackoverflow.com" target="blank_">Stack Overflow</a>
    <a href="https:www.stackexchange.com" target="blank_">StackExchange</a>
    <a href="https://www.google.com/search?q=symmetrical+book+stacking" target="blank_">Symmetrical Book Stacking</a>
    </nav>
<div style="border: solid 2px black; padding: .5rem;">
    <form>
        <fieldset>
            <legend>Basic Data Entry Form Fields</legend>
            <p>
                <label>
                    Eye Color:
                    <input name="eye color"/>
                </label>
                <label>
                     Height:
                    <input name="height"/>
                </label>
                <label>
                     Weight:
                    <input name="weight"/>
                </label>
            </p>
        </fieldset>
    </form>
    </div>

    <h3>Use of a Section</h3>
    <section style="width: 5750%; background-color: orangered;">
        <h3>Describe Your Diet</h3>
        <p>
            <label for="diet">diet</label>
            <textarea id="diet" name="diet"></textarea>
        </p>
        <p>
            <button type="submit">Submit Anser</button>
        </p>
    </section>

    <h1>and an iFrame</h1>
    <p>
        An iFrame allows me to embed HTML documents inside HTML documents.
    </p>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/WQPfQvLIseA"
     title="YouTube video player" frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
       allowfullscreen>
    </iframe>
</body>
</html>
